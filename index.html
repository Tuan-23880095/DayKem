<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Phiếu Học Tập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;0,400;0,500;0,600;0,700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">

    <header class="bg-blue-800 text-white px-6 py-4 flex justify-between items-center shadow-md shrink-0">
        <div class="flex items-center gap-3">
            <span class="text-2xl">📚</span>
            <div>
                <h1 class="text-xl font-bold tracking-wide">KHO TÀI LIỆU KHTN</h1>
                <p class="text-xs text-blue-200">Hệ thống quản lý bài học & phiếu bài tập</p>
            </div>
        </div>
        <div class="text-sm border border-blue-400 rounded-full px-4 py-1 bg-blue-700/50">
            Học kỳ II • Năm học 2025 - 2026
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-80 bg-white border-r border-gray-200 flex flex-col shrink-0">
            <div class="p-4 border-b border-gray-100 space-y-2">
                <input type="text" id="searchBar" onkeyup="filterLessons()" placeholder="🔍 Tìm nhanh bài học..." 
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex-1 overflow-y-auto p-2 space-y-1" id="lessonList">
                
                <button onclick="loadLesson('bai-hoc/buoi-1.html', this)" class="lesson-item w-full text-left p-3 rounded-lg hover:bg-gray-50 transition flex flex-col gap-1 border border-transparent">
                    <span class="font-semibold text-sm text-gray-800">Buổi 1: Mở đầu về KHTN</span>
                    <div class="flex justify-between items-center text-xs text-gray-500">
                        <span>📁 Lý thuyết + Bài tập</span>
                        <span class="px-2 py-0.5 bg-green-100 text-green-700 rounded font-medium">Hoàn thành</span>
                    </div>
                </button>

                <button onclick="loadLesson('bai-hoc/buoi-2.html', this)" class="lesson-item w-full text-left p-3 rounded-lg hover:bg-gray-50 transition flex flex-col gap-1 border border-transparent">
                    <span class="font-semibold text-sm text-gray-800">Buổi 2: Các quy tắc an toàn phòng TH</span>
                    <div class="flex justify-between items-center text-xs text-gray-500">
                        <span>📁 Lý thuyết + Bài tập</span>
                        <span class="px-2 py-0.5 bg-green-100 text-green-700 rounded font-medium">Hoàn thành</span>
                    </div>
                </button>

                <button onclick="loadLesson('bai-hoc/buoi-3.html', this)" class="lesson-item w-full text-left p-3 rounded-lg hover:bg-gray-50 transition flex flex-col gap-1 border border-transparent active-lesson bg-blue-50 border-blue-300">
                    <span class="font-semibold text-sm text-blue-900">Buổi 3: Đo chiều dài & Thời gian</span>
                    <div class="flex justify-between items-center text-xs text-gray-500">
                        <span>📁 Lý thuyết + Bài tập</span>
                        <span class="px-2 py-0.5 bg-green-100 text-green-700 rounded font-medium">Hoàn thành</span>
                    </div>
                </button>

                <button onclick="loadLesson('bai-hoc/buoi-4.html', this)" class="lesson-item w-full text-left p-3 rounded-lg hover:bg-gray-50 transition flex flex-col gap-1 border border-transparent">
                    <span class="font-semibold text-sm text-gray-700">Buổi 4: Đo khối lượng</span>
                    <div class="flex justify-between items-center text-xs text-gray-500">
                        <span>📁 Chưa có nội dung</span>
                        <span class="px-2 py-0.5 bg-amber-100 text-amber-700 rounded font-medium">Đang soạn</span>
                    </div>
                </button>

            </div>
            
            <div class="p-3 bg-gray-50 border-t border-gray-100 text-center text-xs text-gray-400">
                Nhấn vào bài để xem và in ấn trực tiếp
            </div>
        </aside>

        <main class="flex-1 bg-gray-50 p-4 flex flex-col relative h-full">
            <iframe id="contentViewer" src="bai-hoc/buoi-3.html" class="w-full h-full border border-gray-200 rounded-lg shadow-sm bg-white"></iframe>
        </main>

    </div>

    <script>
        // Hàm thay đổi nội dung khung nhìn khi bấm chọn bài
        function loadLesson(url, element) {
            // Thay đổi URL của iframe
            document.getElementById('contentViewer').src = url;

            // Xóa trạng thái active của tất cả các bài cũ
            const items = document.querySelectorAll('.lesson-item');
            items.forEach(item => {
                item.classList.remove('bg-blue-50', 'border-blue-300');
                const title = item.querySelector('span');
                title.classList.remove('text-blue-900');
                title.classList.add('text-gray-800');
            });

            // Thêm trạng thái active cho bài vừa chọn
            element.classList.add('bg-blue-50', 'border-blue-300');
            const activeTitle = element.querySelector('span');
            activeTitle.classList.remove('text-gray-800');
            activeTitle.classList.add('text-blue-900');
        }

        // Hàm lọc tìm kiếm bài học nhanh
        function filterLessons() {
            const input = document.getElementById('searchBar').value.toUpperCase();
            const list = document.getElementById('lessonList');
            const items = list.getElementsByClassName('lesson-item');

            for (let i = 0; i < items.length; i++) {
                const title = items[i].getElementsByTagName('span')[0].textContent || items[i].getElementsByTagName('span')[0].innerText;
                if (title.toUpperCase().indexOf(input) > -1) {
                    items[i].style.display = "";
                } else {
                    items[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
